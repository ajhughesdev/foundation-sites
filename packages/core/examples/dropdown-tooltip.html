<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Foundation 7 — Dropdown + Tooltip (Draft)</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../../css/src/foundation.css" />
    <script type="importmap">
      {
        "imports": {
          "@foundation/core": "../dist/index.js",
          "@foundation/dropdown": "../../dropdown/dist/index.js",
          "@foundation/tooltip": "../../tooltip/dist/index.js"
        }
      }
    </script>
  </head>
  <body>
    <div
      class="f-container f-stack"
      style="--f-container-max: 56rem; --f-stack-gap: var(--f-space-5); padding-block: var(--f-space-5)"
    >
      <h1>Dropdown + Tooltip (Draft)</h1>
      <p>
        Build first: <code>yarn f7:core:build && yarn f7:dropdown:build && yarn f7:tooltip:build</code>, then open this file in a browser.
      </p>

      <div class="demo-toolbar f-cluster" style="--f-cluster-gap: var(--f-space-3)">
        <label for="theme">Theme</label>
        <select id="theme">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>

      <h2>Dropdown</h2>
      <div class="demo-actions f-cluster" style="--f-cluster-gap: var(--f-space-3)">
        <button type="button" data-dropdown-toggle="demo-dropdown-1">Toggle dropdown</button>
        <button type="button" data-dropdown-toggle="demo-dropdown-2">Toggle aligned dropdown</button>
      </div>

      <div id="demo-dropdown-1" data-dropdown hidden>
        <div class="f-stack" style="--f-stack-gap: var(--f-space-2)">
          <p>This dropdown is positioned via JS and styled via layered CSS.</p>
          <div class="f-cluster" style="--f-cluster-gap: var(--f-space-2)">
            <a href="#" data-tooltip="Tooltips work on links too.">Action link</a>
            <button type="button" data-dropdown-close>Close</button>
          </div>
        </div>
      </div>

      <div
        id="demo-dropdown-2"
        data-dropdown
        data-dropdown-placement="bottom-end"
        data-dropdown-match-trigger-width
        hidden
      >
        <div class="f-stack" style="--f-stack-gap: var(--f-space-2)">
          <p>
            Placement: <code>bottom-end</code> + match trigger width.
          </p>
          <div class="f-cluster" style="--f-cluster-gap: var(--f-space-2)">
            <button type="button" data-dropdown-close>Close</button>
          </div>
        </div>
      </div>

      <hr />

      <h2>Tooltip</h2>
      <div class="demo-actions f-cluster" style="--f-cluster-gap: var(--f-space-3)">
        <button type="button" data-tooltip title="Tooltip from title attribute">Hover/focus me</button>
        <button type="button" data-tooltip="Tooltip text can live in data-tooltip">Data tooltip</button>
        <button type="button" data-tooltip="#demo-tooltip-rich">Rich tooltip</button>
        <button type="button" data-tooltip title="Right side tooltip" data-tooltip-placement="right">Right</button>
        <button type="button" data-tooltip title="Bottom tooltip" data-tooltip-placement="bottom">Bottom</button>
      </div>

      <template id="demo-tooltip-rich">
        <strong>Rich</strong> tooltip content from a <code>&lt;template&gt;</code>.
      </template>
    </div>

    <script type="module">
      import { createFoundation } from "@foundation/core";
      import { dropdown } from "@foundation/dropdown";
      import { tooltip } from "@foundation/tooltip";

      const app = createFoundation({ plugins: [dropdown(), tooltip()] });
      app.init(document);

      const storageKey = "foundation7-demo-theme";
      const themeSelect = document.getElementById("theme");

      const applyTheme = (value) => {
        if (value === "system") {
          document.documentElement.removeAttribute("data-theme");
        } else {
          document.documentElement.setAttribute("data-theme", value);
        }
      };

      if (themeSelect instanceof HTMLSelectElement) {
        const stored = localStorage.getItem(storageKey) || "system";
        themeSelect.value = stored;
        applyTheme(stored);

        themeSelect.addEventListener("change", () => {
          localStorage.setItem(storageKey, themeSelect.value);
          applyTheme(themeSelect.value);
        });
      }

      document.querySelectorAll('a[href="#"]').forEach((link) => {
        link.addEventListener("click", (event) => event.preventDefault());
      });
    </script>
  </body>
</html>
