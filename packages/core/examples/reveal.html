<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Foundation 7 — Reveal (Draft)</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../../css/src/foundation.css" />
  </head>
  <body>
    <div
      id="demo-shell"
      class="f-container f-stack"
      style="--f-container-max: 56rem; --f-stack-gap: var(--f-space-5); padding-block: var(--f-space-5)"
    >
      <h1>Reveal (Draft)</h1>
      <p>
        Build first: <code>yarn f7:core:build</code>, then open this file in a browser.
      </p>

      <div class="demo-toolbar f-cluster" style="--f-cluster-gap: var(--f-space-3)">
        <label for="theme">Theme</label>
        <select id="theme">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>

      <div class="demo-actions f-cluster" style="--f-cluster-gap: var(--f-space-3)">
        <button type="button" data-reveal-open="demo-dialog">Open &lt;dialog&gt; reveal</button>
        <button type="button" data-reveal-open="demo-fallback">Open fallback reveal</button>
      </div>
    </div>

    <dialog id="demo-dialog" data-reveal aria-labelledby="demo-dialog-title">
      <h2 id="demo-dialog-title">Hi</h2>
      <p>This is a draft Foundation 7 Reveal using <code>&lt;dialog&gt;</code>.</p>
      <p><button type="button" data-reveal-close>Close</button></p>
    </dialog>

    <div id="demo-fallback" data-reveal aria-labelledby="demo-fallback-title" hidden>
      <h2 id="demo-fallback-title">Fallback reveal</h2>
      <p>This is a non-<code>&lt;dialog&gt;</code> fallback (positioned via CSS, backed by a JS-created backdrop).</p>
      <p><button type="button" data-reveal-close>Close</button></p>
    </div>

    <script type="module">
      import { createFoundation, reveal } from "../dist/index.js";

      const app = createFoundation({ plugins: [reveal()] });
      app.init(document);

      const storageKey = "foundation7-demo-theme";
      const themeSelect = document.getElementById("theme");

      const applyTheme = (value) => {
        if (value === "system") {
          document.documentElement.removeAttribute("data-theme");
        } else {
          document.documentElement.setAttribute("data-theme", value);
        }
      };

      if (themeSelect instanceof HTMLSelectElement) {
        const stored = localStorage.getItem(storageKey) || "system";
        themeSelect.value = stored;
        applyTheme(stored);

        themeSelect.addEventListener("change", () => {
          localStorage.setItem(storageKey, themeSelect.value);
          applyTheme(themeSelect.value);
        });
      }
    </script>
  </body>
</html>
