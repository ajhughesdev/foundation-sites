<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Foundation 7 — Toast (Draft)</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../../css/src/foundation.css" />
  </head>
  <body>
    <div
      class="f-container f-stack"
      style="--f-container-max: 52rem; --f-stack-gap: var(--f-space-5); padding-block: var(--f-space-5)"
    >
      <h1>Toast / Notification (Draft)</h1>
      <p>
        Build first: <code>yarn f7:core:build</code>, then open this file in a browser.
      </p>

      <div class="demo-toolbar f-cluster" style="--f-cluster-gap: var(--f-space-3)">
        <label for="theme">Theme</label>
        <select id="theme">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>

        <label for="position">Toast position</label>
        <select id="position">
          <option value="bottom-end">Bottom end</option>
          <option value="bottom-start">Bottom start</option>
          <option value="top-end">Top end</option>
          <option value="top-start">Top start</option>
        </select>
      </div>

      <div class="f-stack" style="--f-stack-gap: var(--f-space-2)">
        <p>
          Toasts are announced via <code>role="status"</code> (polite) by default. The <code>danger</code> variant uses
          <code>role="alert"</code>.
        </p>
        <p>
          They don’t steal focus, but include a dismiss button.
        </p>
      </div>

      <div class="demo-actions f-cluster" style="--f-cluster-gap: var(--f-space-3)">
        <button
          type="button"
          data-toast-show="demo-toasts"
          data-toast-variant="info"
          data-toast-message="Info: This is a notification."
        >
          Show info toast
        </button>
        <button
          type="button"
          data-toast-show="demo-toasts"
          data-toast-variant="success"
          data-toast-message="Success: Saved!"
        >
          Show success toast
        </button>
        <button
          type="button"
          data-toast-show="demo-toasts"
          data-toast-variant="warning"
          data-toast-message="Warning: Check your input."
        >
          Show warning toast
        </button>
        <button
          type="button"
          data-toast-show="demo-toasts"
          data-toast-variant="danger"
          data-toast-message="Danger: Something went wrong."
        >
          Show danger toast
        </button>
        <button
          type="button"
          id="show-auto-dismiss"
          data-toast-show="demo-toasts"
          data-toast-variant="info"
          data-toast-timeout="350"
          data-toast-message="This toast auto-dismisses quickly (demo timeout)."
        >
          Show quick auto-dismiss
        </button>
        <button type="button" id="clear-toasts">Clear toasts</button>
      </div>

      <div id="demo-toasts" data-toast data-toast-position="bottom-end"></div>
    </div>

    <script type="module">
      import { createFoundation, toast } from "../dist/index.js";

      const app = createFoundation({ plugins: [toast()] });
      app.init(document);

      const storageKey = "foundation7-demo-theme";
      const themeSelect = document.getElementById("theme");

      const applyTheme = (value) => {
        if (value === "system") {
          document.documentElement.removeAttribute("data-theme");
        } else {
          document.documentElement.setAttribute("data-theme", value);
        }
      };

      if (themeSelect instanceof HTMLSelectElement) {
        const stored = localStorage.getItem(storageKey) || "system";
        themeSelect.value = stored;
        applyTheme(stored);

        themeSelect.addEventListener("change", () => {
          localStorage.setItem(storageKey, themeSelect.value);
          applyTheme(themeSelect.value);
        });
      }

      const positionSelect = document.getElementById("position");
      const toastRegion = document.getElementById("demo-toasts");

      if (positionSelect instanceof HTMLSelectElement && toastRegion instanceof HTMLElement) {
        positionSelect.value = toastRegion.getAttribute("data-toast-position") || "bottom-end";
        positionSelect.addEventListener("change", () => {
          toastRegion.setAttribute("data-toast-position", positionSelect.value);
        });
      }

      const clearButton = document.getElementById("clear-toasts");
      if (clearButton instanceof HTMLButtonElement && toastRegion) {
        clearButton.addEventListener("click", () => {
          toastRegion.dispatchEvent(new CustomEvent("foundation:toast:clear", { bubbles: true }));
        });
      }
    </script>
  </body>
</html>
